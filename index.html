<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday, Sasubai!</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 100%);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1000px;
        }

        .container {
            text-align: center;
            position: relative;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        /* Birthday Gift Box Styling */
        .gift-container {
            cursor: pointer;
            transition: transform 0.3s ease;
            display: inline-block;
            margin-top: 50px;
        }

        .gift-container:hover {
            transform: scale(1.05);
        }

        .gift-box {
            position: relative;
            width: 150px;
            height: 150px;
            background: #ff477e;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }

        .gift-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 65px;
            width: 20px;
            height: 100%;
            background: #ffb3c6;
        }

        .gift-box::after {
            content: '';
            position: absolute;
            top: 65px;
            left: 0;
            width: 100%;
            height: 20px;
            background: #ffb3c6;
        }

        .gift-lid {
            position: absolute;
            top: -20px;
            left: -5px;
            width: 160px;
            height: 30px;
            background: #ff5c8a;
            border-radius: 5px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
            transition: transform 0.5s ease;
            z-index: 2;
        }

        .gift-lid::before {
            content: '';
            position: absolute;
            top: 0;
            left: 70px;
            width: 20px;
            height: 100%;
            background: #ffb3c6;
        }

        /* Instruction text */
        .tap-text {
            color: #ff477e;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 20px;
            animation: bounce 1.5s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Birthday Card Hidden Initially */
        .card {
            background: white;
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            display: none;
            opacity: 0;
            transform: scale(0.8) translateY(50px);
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card.reveal {
            display: block;
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        /* Mom's Photo Styling */
        .mom-photo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #ff477e;
            margin: 0 auto 15px auto;
            display: block;
            box-shadow: 0 5px 15px rgba(255, 71, 126, 0.3);
        }

        .card h1 {
            color: #ff477e;
            font-size: 2.2rem;
            margin-bottom: 15px;
            font-family: 'Georgia', serif;
        }

        .card p {
            color: #4a4a4a;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .heart {
            color: #ff477e;
            font-size: 2rem;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.2); }
        }

        /* Confetti Elements */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #ffd166;
            border-radius: 50%;
            opacity: 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="giftSection">
            <div class="tap-text">🎁 Tap to open your gift, Sasubai! 🎁</div>
            <div class="gift-container" onclick="openGift()">
                <div class="gift-lid" id="lid"></div>
                <div class="gift-box"></div>
            </div>
        </div>

        <div class="card" id="birthdayCard">
            <!-- If your photo is a PNG, change mom.jpg below to mom.png -->
            <img src="mom.jpg" alt="Mom" class="mom-photo">
            <h1>Happy Birthday, Mom! ✨</h1>
            <p>Thank you for all the love, warmth, and beautiful moments you bring into our lives every single day. Wishing you a year full of joy, laughter, and endless happiness!</p>
            <div class="heart">❤️</div>
        </div>
    </div>

    <script>
        function openGift() {
            const lid = document.getElementById('lid');
            const giftSection = document.getElementById('giftSection');
            const card = document.getElementById('birthdayCard');

            // Animate the lid flying off
            lid.style.transform = 'translateY(-80px) rotate(-20px)';
            lid.style.opacity = '0';

            // Create explosion confetti
            for (let i = 0; i < 40; i++) {
                createConfetti();
            }

            // Fade out gift box and reveal card
            setTimeout(() => {
                giftSection.style.display = 'none';
                card.classList.add('reveal');
                
                // Continuous gentle confetti drop after opening
                setInterval(createConfettiLoop, 300);
            }, 600);
        }

        function createConfetti() {
            const confetti = document.createElement('div');
            confetti.classList.add('confetti');
            document.body.appendChild(confetti);

            const colors = ['#ff477e', '#ff7096', '#ff85a1', '#fbb1bd', '#ffd166', '#06d6a0', '#118ab2'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            
            confetti.style.background = randomColor;
            confetti.style.left = '50%';
            confetti.style.top = '50%';
            confetti.style.opacity = '1';
            
            const destinationX = (Math.random() - 0.5) * window.innerWidth;
            const destinationY = (Math.random() - 0.5) * window.innerHeight;

            confetti.animate([
                { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                { transform: `translate(${destinationX}px, ${destinationY}px) scale(0)`, opacity: 0 }
            ], {
                duration: 1000 + Math.random() * 1000,
                easing: 'cubic-bezier(0.1, 0.8, 0.3, 1)',
                fill: 'forwards'
            });

            setTimeout(() => confetti.remove(), 2000);
        }

        function createConfettiLoop() {
            const confetti = document.createElement('div');
            confetti.classList.add('confetti');
            document.body.appendChild(confetti);

            const colors = ['#ff477e', '#ff7096', '#ffd166', '#06d6a0', '#118ab2'];
            confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.top = '-10px';
            confetti.style.opacity = '1';

            confetti.animate([
                { transform: 'translateY(0) rotate(0deg)', opacity: 1 },
                { transform: `translateY(100vh) rotate(${Math.random() * 360}deg)`, opacity: 0 }
            ], {
                duration: 3000 + Math.random() * 2000,
                easing: 'linear'
            });

            setTimeout(() => confetti.remove(), 5000);
        }
    </script>
</body>
</html>
